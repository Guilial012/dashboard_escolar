<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard Escolar</title>

  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<header>
  <h1>📚 Dashboard Escolar</h1>
  <p id="subtitle">Carregando...</p>
</header>

<div class="stats">
  <div class="stat-card provas"><div class="number" id="cnt-provas">0</div><div class="label">Provas</div></div>
  <div class="stat-card apresentacoes"><div class="number" id="cnt-apres">0</div><div class="label">Apresentações</div></div>
  <div class="stat-card trabalhos"><div class="number" id="cnt-trab">0</div><div class="label">Entregas</div></div>
  <div class="stat-card outros"><div class="number" id="cnt-outros">0</div><div class="label">Outros</div></div>
</div>

<div class="timeline" id="timeline"></div>

<footer>Clique em cada item para marcar como concluído · Dados salvos automaticamente</footer>


  <script src="js/app.js"></script>
</body>
</html>
