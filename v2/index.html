<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard Escolar</title>

  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- Header -->
<div class="page-header">
  <div>
    <h1>📚 Dashboard Escolar</h1>
    <p id="subtitle">Carregando...</p>
  </div>
  <button class="btn-primary" onclick="openAddForm()">+ Nova Tarefa</button>
</div>

<!-- Stats -->
<div class="stats">
  <div class="stat s-prova"><div class="num" id="st-provas">-</div><div class="lbl">Provas</div></div>
  <div class="stat s-apres"><div class="num" id="st-apres">-</div><div class="lbl">Apres.</div></div>
  <div class="stat s-entrega"><div class="num" id="st-entregas">-</div><div class="lbl">Entregas</div></div>
  <div class="stat s-outros"><div class="num" id="st-outros">-</div><div class="lbl">Outros</div></div>
</div>

<!-- Main grid -->
<div class="main">

  <!-- Calendar -->
  <div class="cal-card">
    <div class="cal-nav">
      <button class="cal-nav-btn" onclick="changeMonth(-1)">&#8249;</button>
      <h2 id="cal-title"></h2>
      <button class="cal-nav-btn" onclick="changeMonth(1)">&#8250;</button>
    </div>
    <div class="cal-grid" id="cal-grid"></div>
    <div id="day-panel"></div>
  </div>

  <!-- Tasks -->
  <div class="tasks-card">
    <div class="tasks-header">
      <h2>Tarefas &amp; Atividades</h2>
      <span id="gcal-spinner" class="spinner" style="display:none"></span>
    </div>
    <div class="gcal-status" id="gcal-status">
      <span class="spinner"></span> Sincronizando com Google Calendar...
    </div>
    <div class="filter-row">
      <button class="filter-btn f-all active" onclick="setFilter('all')">Todas</button>
      <button class="filter-btn f-prova" onclick="setFilter('prova')">Provas</button>
      <button class="filter-btn f-apresentacao" onclick="setFilter('apresentacao')">Apresentações</button>
      <button class="filter-btn f-entrega" onclick="setFilter('entrega')">Entregas</button>
      <button class="filter-btn f-outro" onclick="setFilter('outro')">Outros</button>
    </div>
    <div class="tasks-list" id="tasks-list"></div>
  </div>
</div>

<!-- Add task form -->
<div class="add-card" id="add-card">
  <div class="add-toggle" id="add-toggle" onclick="toggleAddForm()">
    <h2>➕ Nova Tarefa</h2>
    <span class="icon">+</span>
  </div>
  <div class="add-body" id="add-body">
    <div class="form-row">
      <div class="form-group full">
        <label class="form-label">Título *</label>
        <input class="form-input" id="f-title" type="text" placeholder="Ex: Prova de Física — Capítulo 5" />
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Data *</label>
        <input class="form-input" id="f-date" type="date" />
      </div>
      <div class="form-group">
        <label class="form-label">Tipo</label>
        <select class="form-select" id="f-type">
          <option value="prova">Prova</option>
          <option value="apresentacao">Apresentação</option>
          <option value="entrega">Entrega</option>
          <option value="filme">Filme/Atividade</option>
          <option value="outro">Outro</option>
        </select>
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">Descrição / Conteúdo</label>
      <textarea class="form-textarea" id="f-desc" placeholder="Ex: Capítulos 3 e 4, fórmulas de cinética, lista de exercícios..."></textarea>
    </div>
    <label class="gcal-check">
      <input type="checkbox" id="f-gcal" checked />
      Adicionar ao Google Calendar
    </label>
    <div>
      <button class="btn-primary" id="f-submit" onclick="submitTask()">Adicionar Tarefa</button>
    </div>
    <div class="form-msg" id="f-msg"></div>
  </div>
</div>


  <script src="js/app.js"></script>
</body>
</html>
